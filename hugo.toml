baseURL = "https://phuoc2902.github.io/"
languageCode = "vi-vn"
title = "PHƯỚC DEV | Personal Portfolio"
author = "Trương Huy Phước"
theme = "PaperMod"
ignoreLogs = ["warning-goldmark-raw-html"]

[services.googleAnalytics]
id = ""  # Add your Google Analytics ID here if needed

# Cấu hình để hỗ trợ tính năng Search (Tạo file chỉ mục JSON)
[outputs]
    home = ["HTML", "RSS", "JSON"]

[params]
    defaultTheme = "light"
    disableThemeToggle = false
    ShowCodeCopyButtons = true
    displayFullLangName = true
    ShowShareButtons = true
    ShowReadingTime = true
    ShowBreadCrumbs = true      # Hiện đường dẫn (Home > Posts > Title) giúp người dùng dễ điều hướng
    ShowPostNavLinks = true     # Hiện nút bài tiếp theo/bài trước đó ở cuối bài viết

    # --- Cấu hình Tìm kiếm (Search) ---
    [params.fuseOpts]
        isCaseSensitive = false
        shouldSort = true
        location = 0
        distance = 100
        threshold = 0.4
        minMatchCharLength = 0
        keys = ["title", "permalink", "summary", "content"]

    # --- Cấu hình Ảnh bìa ---
    [params.cover]
        hidden = false
        hiddenInList = false
        hiddenInSingle = false

    # --- Profile Mode (Trang chủ) ---
    [params.profileMode]
        enabled = true
        title = "TRƯƠNG HUY PHƯỚC"
        subtitle = "🚀 Học lập trình mỗi ngày - No Pain No Gain" 
        imageUrl = "images/hero-bg.jpg" # Bạn có thể thêm ảnh đại diện tại đây
        imageWidth = 120
        imageHeight = 120
        

        [[params.profileMode.buttons]]
            name = "📚 Đọc Bài Viết"
            url = "/posts/"

        [[params.profileMode.buttons]]
            name = "🔍 More about me"
            url = "/about/"

    # --- Social Icons (Thêm các icon mạng xã hội cho chuyên nghiệp) ---
    [[params.socialIcons]]
        name = "facebook"
        url = "https://www.facebook.com/phuoctruong9211/"
    [[params.socialIcons]]
        name = "github"
        url = "https://github.com/phuoc2902" # Thay bằng link GitHub của bạn

# --- Menu Chính ---
[menu]

    [[menu.main]]
        identifier = "home"
        name = "HOME"
        url = "/"
        weight = 10

    [[menu.main]]
        identifier = "search"
        name = "🔍 SEARCH"
        url = "/search/"
        weight = 5

    [[menu.main]]
        identifier = "posts"
        name = "POSTS"
        url = "/posts/"
        weight = 20

    [[menu.main]]
        identifier = "about"
        name = "ABOUT ME"
        url = "/about/"
        weight = 40
    
    
